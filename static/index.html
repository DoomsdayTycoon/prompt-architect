/* ════════════════════════════════════════════════════════
   PROMPT GENERATION ENGINE (preserved from original)
   ════════════════════════════════════════════════════════ */
const MODELS={claude:{name:"Claude",col:"#D97706"},chatgpt:{name:"ChatGPT",col:"#10A37F"},gemini:{name:"Gemini",col:"#4285F4"},llama:{name:"Llama / OSS",col:"#8B5CF6"},general:{name:"Universal",col:"#64748B"}};
const TASKS={writing:{l:"Writing"},coding:{l:"Coding"},analysis:{l:"Analysis"},brainstorm:{l:"Brainstorm"},summarize:{l:"Summarize"},translate:{l:"Translate"},image:{l:"Image Gen"},roleplay:{l:"Role / Persona"},email:{l:"Email / Comms"},learning:{l:"Learning"}};
const INDUSTRIES={general:{l:"General"},finance:{l:"Finance"},healthcare:{l:"Healthcare"},legal:{l:"Legal"},marketing:{l:"Marketing"},tech:{l:"Tech / SaaS"},education:{l:"Education"},ecommerce:{l:"E-commerce"},consulting:{l:"Consulting"},realestate:{l:"Real Estate"},media:{l:"Media"},hr:{l:"HR"},manufacturing:{l:"Manufacturing"},government:{l:"Government"},research:{l:"Research"}};
const OUTPUTS={document:{l:"Document"},email:{l:"Email"},code:{l:"Code"},presentation:{l:"Presentation"},spreadsheet:{l:"Spreadsheet"},social:{l:"Social"},blog:{l:"Blog"},proposal:{l:"Proposal"},brief:{l:"Brief"},docs:{l:"Documentation"},creative:{l:"Creative"},checklist:{l:"Checklist"}};
const STYLES={formal:{l:"Formal"},conversational:{l:"Conversational"},technical:{l:"Technical"},persuasive:{l:"Persuasive"},narrative:{l:"Narrative"},instructional:{l:"Instructional"},analytical:{l:"Analytical"},minimalist:{l:"Minimalist"}};
const TONES=[{v:"Professional"},{v:"Casual"},{v:"Academic"},{v:"Creative"},{v:"Friendly"},{v:"Authoritative"},{v:"Empathetic"}];
const LENGTHS=["Brief","Medium","Detailed","Comprehensive"];
const FMTS={prose:{l:"Prose"},bullets:{l:"Bullets"},numbered:{l:"Steps"},table:{l:"Tables"},qa:{l:"Q&A"},json:{l:"JSON"},codeblock:{l:"Code blocks"},headers:{l:"Sections"},tldr:{l:"TL;DR"},framework:{l:"Framework"},flowchart:{l:"Flowchart"},before_after:{l:"Before/After"},pros_cons:{l:"Pros & Cons"},scorecard:{l:"Scorecard"},annotated:{l:"Examples"},markdown:{l:"Markdown"}};
const INCLUDES={exec_summary:{l:"Executive Summary"},examples:{l:"Examples"},sources:{l:"Sources"},action_items:{l:"Action Items"},risks:{l:"Risk Assessment"},comparison:{l:"Comparison"},timeline:{l:"Timeline"},metrics:{l:"KPIs"},glossary:{l:"Glossary"},visuals:{l:"Visuals"}};
const LANGS=["English","Spanish","French","German","Portuguese","Italian","Dutch","Norwegian","Swedish","Danish","Chinese","Japanese","Korean","Arabic","Hindi","Russian","Polish","Turkish"];

const IND_CONTEXT={general:"",finance:"Use financial terminology (EBITDA, DCF, IRR, NPV, P/E). Reference GAAP/IFRS, Basel III. Be precise with numbers and currencies.",healthcare:"Use medical terminology appropriately. Reference clinical guidelines (WHO, NIH, CDC). Note HIPAA considerations. Distinguish evidence levels.",legal:"Use precise legal terminology. Cite statutes/case law. Note jurisdictional variations. Structure with IRAC (Issue, Rule, Application, Conclusion).",marketing:"Use marketing terminology (CAC, LTV, ROAS). Reference platform best practices. Include measurable KPIs.",tech:"Use technical terminology accurately. Reference industry standards and best practices. Consider scalability, security, performance.",education:"Apply pedagogical best practices (Bloom's taxonomy, scaffolding). Design for learning outcomes.",ecommerce:"Use industry metrics (AOV, conversion rate, CLV). Reference platform best practices.",consulting:"Use structured problem-solving frameworks. Present with pyramid principle. Quantify impact.",realestate:"Use industry terminology (cap rate, NOI, GRM). Reference market analysis methodologies.",media:"Consider platform algorithms, content lifecycle, SEO best practices.",hr:"Reference employment law, DEI, organizational psychology. Use HR terminology.",manufacturing:"Use OEE, Six Sigma, lean terminology. Reference ISO standards.",government:"Reference regulatory frameworks. Use clear, accessible language.",research:"Use rigorous methodology. Distinguish hypotheses from findings. Address reproducibility."};

const ROLE_DEEP={writing:"a senior writer with 15+ years crafting compelling narratives",coding:"a principal engineer with deep expertise across languages and design patterns",analysis:"a senior analyst with expertise in research and structured thinking",brainstorm:"a creative strategist combining design thinking and lateral thinking",summarize:"an expert editor specializing in clarity and accuracy",translate:"a professional translator with native fluency",image:"an expert AI image prompt engineer",roleplay:"a skilled domain expert with authentic voice",email:"a professional communications specialist",learning:"an expert educator applying pedagogical best practices"};

const METHODOLOGY={writing:["Open with a compelling hook","Structure with clear narrative arc","Support with concrete examples","Vary sentence length for readability","Use precise transitions","Close with memorable conclusion"],coding:["Analyze requirements and state assumptions","Write clean, idiomatic code","Include comprehensive comments","Add error handling and validation","Provide usage examples","Suggest testing strategies"],analysis:["Lead with executive summary","Define scope and methodology","Apply established frameworks","Support with specific data","Address counterarguments","Present actionable recommendations"],brainstorm:["Generate ideas without self-censoring","For each idea: title, 2-3 sentences, why it works","Organize by feasibility and impact","Include both incremental and bold ideas","Identify synergies","Highlight top 3 with reasoning"],summarize:["Open with single-sentence overview","Organize by importance","Preserve critical nuances","Use direct, concrete language","Include action items","Note what was omitted"],translate:["Preserve meaning and tone","Adapt idioms","Maintain consistent terminology","Flag untranslatable concepts","Preserve structure"],image:["Specify subject in vivid detail","Define artistic style","Include lighting and quality","Specify camera angle","Add color palette","Include negative prompts"],roleplay:["Establish persona background and expertise","Define knowledge boundaries","Maintain consistent voice","React authentically"],email:["Lead with clear subject line","Put key ask first","Keep paragraphs short","End with specific CTA","Include needed context"],learning:["Assess starting knowledge","Scaffold from simple to complex","Use 2-3 real-world analogies","Include understanding checks","Address misconceptions","Summarize and suggest next steps"]};

const QUALITY={writing:"Every paragraph has clear purpose. Every claim needs evidence. Match readability to audience.",coding:"Code is syntactically correct, follows DRY/SOLID, handles edge cases.",analysis:"Every conclusion traces to evidence. Separate correlation from causation. State confidence.",brainstorm:"Ideas are specific and actionable. Each is distinct. Include unconventional angles.",summarize:"Summary stands alone. Reader gets all key points. Zero unnecessary words.",translate:"Native speaker wouldn't detect translation. Preserves nuance and humor.",image:"Prompt produces consistent results. Zero ambiguity in composition and style.",roleplay:"Persona feels authentic. Consistent. Reflects genuine expertise.",email:"Accomplishes goal in single read. No ambiguity about action. Professional.",learning:"Learner can teach concept to someone else after reading."};

const TONE_INST={Professional:"Polished, direct. Avoid slang. Project competence.",Casual:"Conversational. Contractions OK. Still accurate.",Academic:"Precise. Cite reasoning. Hedge when uncertain.",Creative:"Vivid, evocative. Metaphors. Varied rhythm.",Friendly:"Warm, encouraging. Use 'we/let's'. Supportive.",Authoritative:"Confident, declarative. Back every assertion.",Empathetic:"Acknowledge emotions. Validate before solving."};

const STYLE_INST={formal:"Formal register throughout. Complete sentences. No contractions.",conversational:"Natural speech. Short and long sentences mixed. Rhetorical questions OK.",technical:"Precise vocabulary. Define on first use. Logic-driven.",persuasive:"Lead with strongest argument. Social proof. Address objections.",narrative:"Tell a story. Characters, scenes, tension, resolution.",instructional:"Step-by-step. Action verbs. Anticipate mistakes.",analytical:"Data-driven. Evidence before conclusions. Objective.",minimalist:"Maximum clarity, minimum words. Every word earns its place."};

function buildPrompt({topic,taskType,model,tone,length,format,language}){
  const isXml=model==="claude";
  const lines=[];
  const sec=(tag,content)=>{
    if(isXml)lines.push(`<${tag}>\n${content}\n</${tag}>`);
    else lines.push(`## ${tag.charAt(0).toUpperCase()+tag.slice(1).replace(/_/g," ")}\n${content}`);
  };

  sec("role",`You are ${ROLE_DEEP[taskType]||"a helpful expert"}.`);
  if(IND_CONTEXT[taskType])sec("domain_expertise",IND_CONTEXT[taskType]);

  sec("task",topic+"\n\nYour response must be thorough, well-structured, and demonstrate expert-level depth. Deliver genuine professional value.");

  const fmtLabels=Array.isArray(format)?format.map(f=>FMTS[f]?.l||f).join(", "):(FMTS[format]?.l||format);
  const ctx=[`Tone: ${tone}`,`Style: ${STYLES[taskType]?.l||"professional"}`,`Length: ${length}`,`Format: ${fmtLabels}`];
  if(language&&language!=="English")ctx.push(`Language: Respond entirely in ${language}`);
  sec("context",ctx.join("\n"));

  const methods=METHODOLOGY[taskType]||METHODOLOGY.writing;
  sec("methodology","Follow this approach:\n\n"+methods.map((m,i)=>`${i+1}. ${m}`).join("\n"));

  sec("quality_standards",QUALITY[taskType]||QUALITY.writing);

  sec("avoid","- No filler phrases like 'Sure!' or 'Great question!'\n- No vague hedging without specifics\n- No generic background the audience knows\n- No empty clichés\n- No repetition to inflate length");

  return lines.join("\n\n");
}

/* ════════════════════════════════════════════════════════
   MAIN APP

function App(){
  const [view,setView]=useState("landing");
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("pa_user"))}catch{return null}});
  const [showAuth,setShowAuth]=useState(false);
  const [authMode,setAuthMode]=useState("signup");
  const [authEmail,setAuthEmail]=useState("");
  const [authPass,setAuthPass]=useState("");
  const [authName,setAuthName]=useState("");
  const [authError,setAuthError]=useState("");

  const [topic,setTopic]=useState("");
  const [task,setTask]=useState("writing");
  const [model,setModel]=useState("claude");
  const [tone,setTone]=useState("Professional");
  const [len,setLen]=useState("Medium");
  const [fmt,setFmt]=useState(["prose","headers"]);
  const [language,setLanguage]=useState("English");
  const [copied,setCopied]=useState(false);
  const [show,setShow]=useState(false);
  const resultRef=useRef(null);

  const prompt=useMemo(()=>buildPrompt({topic,taskType:task,model,tone,length:len,format:fmt,language}),[topic,task,model,tone,len,fmt,language]);

  const handleSignup=useCallback(()=>{
    if(!authName.trim()){setAuthError("Name required");return;}
    if(!authEmail.includes("@")){setAuthError("Valid email required");return;}
    if(authPass.length<6){setAuthError("Password min 6 chars");return;}
    const newUser={name:authName,email:authEmail};
    localStorage.setItem("pa_user",JSON.stringify(newUser));
    setUser(newUser);
    setShowAuth(false);
    setAuthEmail("");setAuthPass("");setAuthName("");setAuthError("");
    setView("app");
  },[authName,authEmail,authPass]);

  const handleLogin=useCallback(()=>{
    if(!authEmail.includes("@")){setAuthError("Valid email required");return;}
    if(authPass.length<6){setAuthError("Password min 6 chars");return;}
    try{
      const users=JSON.parse(localStorage.getItem("pa_users"))||[];
      const found=users.find(u=>u.email===authEmail&&u.password===authPass);
      if(found){
        localStorage.setItem("pa_user",JSON.stringify({name:found.name,email:found.email}));
        setUser({name:found.name,email:found.email});
        setShowAuth(false);
        setAuthEmail("");setAuthPass("");setAuthError("");
        setView("app");
      }else{
        setAuthError("Email or password incorrect");
      }
    }catch(e){setAuthError("Error logging in");}
  },[authEmail,authPass]);

  const handleLogout=useCallback(()=>{
    localStorage.removeItem("pa_user");
    setUser(null);
    setTopic("");setShow(false);
    setView("landing");
  },[]);

  const handleGenerate=useCallback(()=>{
    if(!topic.trim())return;
    setShow(true);
    setTimeout(()=>resultRef.current?.scrollIntoView({behavior:"smooth",block:"start"}),100);
  },[topic]);

  const handleCopy=useCallback(()=>{
    navigator.clipboard.writeText(prompt).then(()=>{
      setCopied(true);
      setTimeout(()=>setCopied(false),2000);
    });
  },[prompt]);

  const handleClear=useCallback(()=>{
    setTopic("");
    setShow(false);
  },[]);

  const handleLoadExample=useCallback((text)=>{
    setTopic(text);
    setShow(false);
  },[]);

  /* ════════════════════════════════════════════════════════
     LANDING PAGE
     ════════════════════════════════════════════════════════ */
  if(view==="landing"){
    return<div style={{minHeight:"100vh",background:"var(--bg)"}}>
      {/* NAVBAR */}
      <nav style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"20px max(20px, 5vw)",maxWidth:"1200px",margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,fontSize:20,fontWeight:700,color:"var(--ac)"}}>
          {I.bolt(24,"var(--ac)")}Prompt Architect
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <button onClick={()=>{setShowAuth(true);setAuthMode("login");}} style={{padding:"10px 16px",border:"none",background:"transparent",color:"var(--t2)",fontWeight:500,cursor:"pointer",fontSize:14}}>Log in</button>
          <button onClick={()=>{setShowAuth(true);setAuthMode("signup");setAuthName("");setAuthEmail("");setAuthPass("");setAuthError("");}} style={{padding:"10px 20px",border:"none",background:"var(--ac)",color:"white",borderRadius:6,fontWeight:600,cursor:"pointer",fontSize:14}}>Get Started</button>
        </div>
      </nav>

      {/* HERO */}
      <section style={{padding:"80px max(20px,5vw)",background:"linear-gradient(135deg, #eff6ff 0%, #f0fdfa 100%)",textAlign:"center"}}>
        <div style={{maxWidth:"800px",margin:"0 auto"}}>
          <div style={{display:"inline-block",padding:"8px 16px",background:"var(--ac)",color:"white",borderRadius:20,fontSize:12,fontWeight:600,marginBottom:20}}>Smart Prompt Engineering</div>
          <h1 style={{fontSize:"clamp(28px,6vw,48px)",fontWeight:800,color:"var(--t1)",margin:"0 0 16px",lineHeight:1.2}}>Turn vague ideas into expert-level AI prompts</h1>
          <p style={{fontSize:18,color:"var(--t2)",margin:"0 0 40px",lineHeight:1.6}}>Prompt Architect analyzes your goal and automatically injects audience targeting, reasoning strategies, and domain expertise — so your AI delivers better results, every time.</p>
          <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap",marginBottom:60}}>
            <button onClick={()=>{setShowAuth(true);setAuthMode("signup");}} style={{padding:"14px 28px",background:"var(--ac)",color:"white",border:"none",borderRadius:8,fontSize:16,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}>Start for free {I.arrow(18,"white")}</button>

          </div>
        </div>

        <h2 style={{textAlign:"center",fontSize:32,fontWeight:700,color:"var(--t1)",marginBottom:60}}>How it works</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))",gap:40}}>
          {[
            {num:1,title:"Describe your goal",desc:"Write anything, even vaguely. Prompt Architect understands intent."},
            {num:2,title:"We enhance it",desc:"Smart analysis injects audience targeting, reasoning patterns, and expert strategies."},
            {num:3,title:"Copy and paste",desc:"Use the crafted prompt in Claude, ChatGPT, Gemini, or any AI. Get professional results."}
          ].map(({num,title,desc})=>(
            <div key={num} style={{padding:30,background:"var(--s1)",borderRadius:12,border:`1px solid var(--bd)`,boxShadow:"var(--shadow)"}}>
              <div style={{width:40,height:40,background:"var(--ac)",color:"white",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:700,marginBottom:16}}>{num}</div>
              <h3 style={{fontSize:18,fontWeight:700,color:"var(--t1)",margin:"0 0 8px"}}>{title}</h3>
              <p style={{color:"var(--t2)",fontSize:14,margin:0,lineHeight:1.6}}>{desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* FEATURES */}
      <section style={{padding:"80px max(20px,5vw)",background:"var(--s2)",maxWidth:"1000px",margin:"0 auto",borderRadius:12}}>
        <h2 style={{textAlign:"center",fontSize:28,fontWeight:700,color:"var(--t1)",marginBottom:40}}>Professional-grade features</h2>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))",gap:30}}>
          {[
            {icon:I.sparkle(24,"var(--ac)"),title:"Smart Enhancement",desc:"Auto-injects audience, reasoning, industry context"},
            {icon:I.check(24,"var(--ac)"),title:"15 Industries",desc:"Finance, Healthcare, Legal, Tech, Marketing, and more"},

              <p style={{color:"var(--t2)",fontSize:14,margin:0}}>{desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* CTA BANNER */}
      <section style={{padding:"60px max(20px,5vw)",textAlign:"center"}}>
        <h2 style={{fontSize:28,fontWeight:700,color:"var(--t1)",margin:"0 0 20px"}}>Ready to get better AI results?</h2>
        <button onClick={()=>{setShowAuth(true);setAuthMode("signup");}} style={{padding:"14px 32px",background:"var(--ac)",color:"white",border:"none",borderRadius:8,fontSize:16,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8}}>Get Started Free {I.arrow(18,"white")}</button>
      </section>

      {/* FOOTER */}
      <footer style={{padding:"40px",textAlign:"center",color:"var(--t3)",fontSize:14,borderTop:"1px solid var(--bd)"}}>
        <p style={{margin:0}}>Built by <strong>Ola Slettebak</strong> • <a href="https://github.com/DoomsdayTycoon/prompt-architect" target="_blank" style={{color:"var(--ac)",textDecoration:"none"}}>GitHub</a></p>

          </div>

          {authMode==="signup"&&<input type="text" placeholder="Full name" value={authName} onChange={e=>setAuthName(e.target.value)} style={{width:"100%",padding:12,borderRadius:6,border:"1px solid var(--bd)",marginBottom:12,fontFamily:"inherit",fontSize:14}}/>}
          <input type="email" placeholder="Email" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} style={{width:"100%",padding:12,borderRadius:6,border:"1px solid var(--bd)",marginBottom:12,fontFamily:"inherit",fontSize:14}}/>
          <input type="password" placeholder="Password" value={authPass} onChange={e=>setAuthPass(e.target.value)} style={{width:"100%",padding:12,borderRadius:6,border:"1px solid var(--bd)",marginBottom:12,fontFamily:"inherit",fontSize:14}}/>

          {authError&&<div style={{padding:10,background:"#fee2e2",color:"#991b1b",borderRadius:6,marginBottom:12,fontSize:13}}>{authError}</div>}

          <button onClick={authMode==="signup"?handleSignup:handleLogin} style={{width:"100%",padding:12,background:"var(--ac)",color:"white",border:"none",borderRadius:6,fontWeight:600,cursor:"pointer",marginBottom:12}}>
            {authMode==="signup"?"Create Account":"Log In"}
          </button>

          <button onClick={()=>{setAuthMode(authMode==="signup"?"login":"signup");setAuthError("");}} style={{width:"100%",padding:12,background:"var(--s2)",border:"none",borderRadius:6,cursor:"pointer",color:"var(--ac)",fontWeight:500,fontSize:14}}>
            {authMode==="signup"?"Already have one? Log in":"Don't have one? Sign up"}
          </button>
        </div>
      </div>}
    </div>;
  }

  /* ════════════════════════════════════════════════════════
     APP PAGE
     ════════════════════════════════════════════════════════ */
  return<div style={{minHeight:"100vh",background:"var(--bg)"}}>
    {/* NAVBAR */}
    <nav style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px max(20px,5vw)",borderBottom:"1px solid var(--bd)",background:"var(--s1)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,fontSize:18,fontWeight:700,color:"var(--ac)",cursor:"pointer"}} onClick={()=>setView("landing")}>
        {I.bolt(22,"var(--ac)")}Prompt Architect
      </div>
      <div style={{display:"flex",alignItems:"center",gap:16}}>
        <span style={{color:"var(--t2)",fontSize:14}}>{user?.name}</span>
        <button onClick={handleLogout} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",background:"transparent",border:"1px solid var(--bd)",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:500,color:"var(--t2)"}}>{I.logOut(16,"var(--t2)")}Log out</button>
      </div>
    </nav>

    {/* MAIN */}
    <div style={{maxWidth:"900px",margin:"0 auto",padding:"40px max(20px,5vw)"}}>
      <div style={{background:"var(--s1)",borderRadius:12,padding:40,boxShadow:"var(--shadow)"}}>
        <h1 style={{fontSize:28,fontWeight:700,color:"var(--t1)",margin:"0 0 8px"}}>Describe your goal</h1>
        <p style={{color:"var(--t2)",fontSize:14,margin:"0 0 24px"}}>Be specific or vague — we'll enhance it into an expert prompt.</p>

        <textarea value={topic} onChange={e=>setTopic(e.target.value)} placeholder="e.g. Analyze Tesla's competitive position in the EV market vs BYD, Rivian, and legacy automakers" style={{width:"100%",padding:16,borderRadius:8,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:14,lineHeight:1.6,minHeight:120,resize:"vertical",marginBottom:16}}/>

        {topic&&<button onClick={handleClear} style={{padding:"8px 12px",background:"var(--s2)",border:"1px solid var(--bd)",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:500,color:"var(--t2)",marginBottom:24,display:"flex",alignItems:"center",gap:4}}>{I.x(14,"var(--t2)")}Clear</button>}

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit, minmax(200px, 1fr))",gap:16,marginBottom:30}}>
          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>Task Type</label>
            <select value={task} onChange={e=>setTask(e.target.value)} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {Object.entries(TASKS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
            </select>
          </div>

          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>AI Model</label>
            <select value={model} onChange={e=>setModel(e.target.value)} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {Object.entries(MODELS).map(([k,v])=><option key={k} value={k}>{v.name}</option>)}
            </select>
          </div>

          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>Tone</label>
            <select value={tone} onChange={e=>setTone(e.target.value)} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {TONES.map(({v})=><option key={v} value={v}>{v}</option>)}
            </select>
          </div>

          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>Length</label>
            <select value={len} onChange={e=>setLen(e.target.value)} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {LENGTHS.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          </div>

          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>Format</label>
            <select value={fmt[0]||""} onChange={e=>setFmt([e.target.value])} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {Object.entries(FMTS).map(([k,v])=><option key={k} value={k}>{v.l}</option>)}
            </select>
          </div>

          <div>
            <label style={{display:"block",fontSize:12,fontWeight:600,color:"var(--t3)",marginBottom:8}}>Language</label>
            <select value={language} onChange={e=>setLanguage(e.target.value)} style={{width:"100%",padding:10,borderRadius:6,border:"1px solid var(--bd)",fontFamily:"inherit",fontSize:13,background:"var(--s2)",color:"var(--t1)"}}>
              {LANGS.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
          </div>
        </div>

        <button onClick={handleGenerate} disabled={!topic.trim()} style={{width:"100%",padding:14,background:topic.trim()?"var(--ac)":"var(--t3)",color:"white",border:"none",borderRadius:8,fontWeight:600,cursor:topic.trim()?"pointer":"not-allowed",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",gap:8,transition:"all .2s"}}>
          {I.sparkle(18,"white")}Generate Expert Prompt
        </button>
      </div>

      {show&&topic.trim()&&<div ref={resultRef} style={{marginTop:40,background:"var(--s1)",borderRadius:12,padding:40,boxShadow:"var(--shadow)",animation:"fadeIn .3s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"var(--t1)"}}>Your Prompt</h2>
          <div style={{display:"flex",gap:8}}>
            <button onClick={handleCopy} style={{padding:"8px 14px",background:copied?"#10b981":"var(--ac)",color:"white",border:"none",borderRadius:6,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6,transition:"all .2s"}}>
              {copied?I.check(16,"white"):I.copy(16,"white")}{copied?"Copied":"Copy"}
            </button>
          </div>
        </div>

        <pre style={{padding:20,background:"var(--bg)",borderRadius:8,overflow:"auto",maxHeight:400,fontSize:12,lineHeight:1.7,color:"var(--t2)",fontFamily:"'IBM Plex Mono', monospace",border:"1px solid var(--bd)"}}>{prompt}</pre>

        <div style={{marginTop:16,display:"flex",gap:8,fontSize:12,color:"var(--t3)"}}>
          <span>{prompt.length} characters</span>
          <span>~{Math.ceil(prompt.split(/\s+/).length/0.75)} tokens</span>
        </div>
      </div>}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
