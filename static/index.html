const loadUser=()=>{try{const u=localStorage.getItem("pa_user");return u?JSON.parse(u):null;}catch(e){return null;}};
const saveUser=(u)=>{localStorage.setItem("pa_user",JSON.stringify(u));};
const getStoredUsers=()=>{try{const u=localStorage.getItem("pa_users");return u?JSON.parse(u):[];}catch(e){return [];}};
const saveUsers=(users)=>{localStorage.setItem("pa_users",JSON.stringify(users));};
const validateEmail=(e)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e);
const validatePassword=(p)=>p.length>=6;
const signupUser=(name,email,password)=>{if(!validateEmail(email))return {ok:false,msg:"Invalid email"};if(!validatePassword(password))return {ok:false,msg:"Password must be 6+ chars"};const users=getStoredUsers();if(users.find(u=>u.email===email))return {ok:false,msg:"Email already registered"};const newUser={name,email,password};users.push(newUser);saveUsers(users);return {ok:true,user:{name,email}};};
const loginUser=(email,password)=>{const users=getStoredUsers();const user=users.find(u=>u.email===email&&u.password===password);return user?{ok:true,user:{name:user.name,email:user.email}}:{ok:false,msg:"Invalid email or password"};};

/* ═══════════════════════════════════════════════════════
   SMART ENHANCEMENT ENGINE
   Analyzes raw user input and intelligently enriches it.
   This is the core intelligence — makes the output better
   than what the user could specify manually.
   ═══════════════════════════════════════════════════════ */
function analyzeInput(topic){
  const t=topic.toLowerCase();
  const words=t.split(/\s+/);
  const signals={vague:false,missingAudience:true,missingScope:true,missingDeliverable:true,hasNumbers:false,hasComparison:false,hasTimeframe:false,short:words.length<12};

  if(/\b(about|regarding|on the topic of|related to|something about)\b/.test(t)&&words.length<15)signals.vague=true;
  if(/\b(for|targeting|aimed at|audience|readers?|users?|students?|managers?|developers?|executives?|beginners?|seniors?|juniors?)\b/.test(t))signals.missingAudience=false;
  if(/\b(focus on|scope|specifically|covering|including|limited to|within|between|from .+ to)\b/.test(t))signals.missingScope=false;
  if(/\b(create|build|write|draft|produce|generate|design|develop|make|prepare|deliver|output|format)\b/.test(t))signals.missingDeliverable=false;
  if(/\d/.test(t))signals.hasNumbers=true;
  if(/\b(vs\.?|versus|compar|against|between|differ|better|worse|alternative)\b/.test(t))signals.hasComparison=true;
  if(/\b(q[1-4]|202[0-9]|timeline|deadline|by |until |before |after |this (week|month|quarter|year))\b/.test(t))signals.hasTimeframe=true;

  return signals;
}

function getSmartEnhancements(topic,taskType,industry,output){
  const signals=analyzeInput(topic);
  const enhancements=[];

  // Vague or too short — add specificity guidance
  if(signals.vague||signals.short){
    enhancements.push({type:"specificity",label:"Added specificity guidance",text:"Be specific and concrete. Where the request is broad, narrow the focus to the most high-impact aspects. Provide depth over breadth \u2014 a thorough treatment of fewer points is more valuable than a shallow overview of many."});
  }

  // Missing audience — smart infer from context
  if(signals.missingAudience){
    const audienceMap={
      finance:{analysis:"senior financial analysts and portfolio managers",writing:"CFOs, investors, and financial decision-makers",email:"C-suite executives and board members",learning:"finance professionals seeking to deepen expertise"},
      healthcare:{analysis:"clinical directors and healthcare administrators",writing:"medical professionals and healthcare policy makers",learning:"medical students and junior clinicians"},
      legal:{analysis:"senior partners and in-house counsel",writing:"attorneys and legal professionals",learning:"law students and junior associates"},
      marketing:{analysis:"CMOs and growth leads",writing:"brand managers and marketing directors",brainstorm:"creative directors and growth teams"},
      tech:{coding:"senior developers who will maintain this code",analysis:"CTOs and engineering managers",writing:"technical product managers and engineering leads",learning:"developers with 1-3 years experience"},
      education:{learning:"students (assume foundational knowledge in the subject area)",writing:"educators and curriculum designers"},
      consulting:{analysis:"C-suite clients expecting McKinsey-level deliverables",writing:"senior stakeholders who need to make decisions based on this"},
    };
    const fallback={analysis:"knowledgeable professionals who expect depth and precision",writing:"engaged professionals who value clarity and actionable insight",coding:"experienced developers who value clean, maintainable code",brainstorm:"cross-functional team members evaluating ideas for feasibility",summarize:"busy decision-makers who need the key points fast",email:"professional recipients who expect clear, action-oriented communication",learning:"motivated learners with foundational knowledge in the subject",translate:"native speakers of the target language",image:"users familiar with AI image generation tools",roleplay:"an audience that expects authentic, consistent persona responses"};
    const indMap=audienceMap[industry]||{};
    const inferred=indMap[taskType]||fallback[taskType]||"knowledgeable professionals who expect depth and precision";
    enhancements.push({type:"audience",label:"Smart audience targeting",text:"Target audience: "+inferred+". Calibrate vocabulary, assumed knowledge, and depth accordingly."});
  }

  // Missing scope — add intelligent scoping
  if(signals.missingScope&&!signals.short){
    enhancements.push({type:"scope",label:"Intelligent scoping",text:"Prioritize the most decision-relevant aspects. If the topic is broad, identify the 3-5 most critical dimensions and go deep on those rather than attempting exhaustive coverage."});
  }

  // Comparison detected — add structured comparison framework
  if(signals.hasComparison){
    enhancements.push({type:"comparison",label:"Comparison framework added",text:"Structure any comparisons using consistent evaluation criteria. For each option: state the criterion, provide evidence, and give a clear assessment. Conclude with a recommendation and the conditions under which alternatives would be preferred."});
  }

  // Industry-specific auto-enhancements
  const industryBoosts={
    finance:!signals.hasNumbers?{type:"precision",label:"Financial precision added",text:"Quantify all claims with specific figures, percentages, or ranges. Specify time periods, currencies, and whether figures are actual or estimated. Use standard financial metrics appropriate to the analysis type."}:null,
    healthcare:{type:"safety",label:"Clinical safety note added",text:"Include appropriate disclaimers where clinical decisions are involved. Distinguish between evidence levels. Note when specialist consultation is recommended."},
    legal:{type:"jurisdiction",label:"Jurisdictional awareness added",text:"Note jurisdictional applicability and variations. Flag where local legal counsel should verify. Distinguish between established precedent and emerging law."},
    tech:taskType==="coding"?{type:"production",label:"Production readiness added",text:"Address error handling, edge cases, security implications, and performance characteristics. Include type annotations where applicable. Note any dependency version requirements."}:null,
  };
  const boost=industryBoosts[industry];
  if(boost)enhancements.push(boost);

  // Task-specific auto-techniques
  const autoTechniques={
    analysis:["Think through your reasoning step by step. Show your analytical framework explicitly.","Before finalizing, verify: Are conclusions supported by evidence? Are there counterarguments you haven't addressed? Are recommendations specific and actionable?"],
    coding:["Before writing code, briefly state your approach and any assumptions. After implementation, note testing strategies and potential edge cases."],
    brainstorm:["Push beyond the obvious. After generating initial ideas, deliberately explore unconventional angles and cross-domain inspiration."],
    email:["Before writing, identify: What is the single most important thing the recipient should do after reading this? Structure everything around that action."],
  };
  const autoTech=autoTechniques[taskType];
  if(autoTech){
    enhancements.push({type:"technique",label:"Smart reasoning strategy",text:autoTech.join(" ")});
  }

  // Output-specific structural guidance
  if(output==="presentation"){
    enhancements.push({type:"structure",label:"Presentation structure optimized",text:"Each slide should make exactly one point. Use the assertion-evidence model: slide title states the conclusion, body provides the evidence. Maximum 3-5 bullets per slide. Include speaker notes with talking points and transition cues."});
  }
  if(output==="proposal"){
    enhancements.push({type:"structure",label:"Proposal persuasion framework",text:"Structure for maximum persuasive impact: lead with the problem (make the reader feel the pain), then the solution (make it feel inevitable), then evidence (make it feel safe). End with clear next steps and urgency."});
  }

  return enhancements;
}

function buildPrompt(p){
  const {topic,taskType,model,tone,length,format,techniques,audience,extra,mode,industry,output,style,includes,language}=p;
  const isXml=model==="claude";const isExp=mode==="expert";const lines=[];
  const sec=(tag,content)=>{
    if(isXml)lines.push("<"+tag+">\n"+content+"\n</"+tag+">");
    else if(model==="gemini")lines.push("**"+tag.toUpperCase().replace(/_/g," ")+"**\n"+content);
    else lines.push("## "+tag.charAt(0).toUpperCase()+tag.replace(/_/g," ").slice(1)+"\n"+content);
  };

  // ROLE
  sec("role","You are "+( ROLE_DEEP[taskType]||"a helpful expert assistant")+".");

  // INDUSTRY CONTEXT
  if(industry!=="general"&&IND_CONTEXT[industry])sec("domain_expertise",IND_CONTEXT[industry]);

  // TASK + SMART ENHANCEMENT
  const enhancements=getSmartEnhancements(topic,taskType,industry,output);
  const smartContext=enhancements.filter(e=>e.type==="specificity"||e.type==="scope").map(e=>e.text).join("\n\n");
  const taskBlock=topic+(smartContext?"\n\n"+smartContext:"")+"\n\nYour response must be thorough, well-structured, and demonstrate expert-level depth. Deliver genuine professional value \u2014 not a surface-level overview.";
  sec("task",taskBlock);

  // CONTEXT
  const fmtLabels=(Array.isArray(format)?format:[format]).map(f=>FMTS[f]?.l||f).join(", ");
  const audienceEnhancement=enhancements.find(e=>e.type==="audience");
  const ctx=[];
  if(audience)ctx.push("Target audience: "+audience);
  else if(audienceEnhancement)ctx.push(audienceEnhancement.text);
  else ctx.push("Target audience: Knowledgeable professionals who expect depth and precision");
  ctx.push("Tone: "+tone+" \u2014 "+(TONE_INST[tone]||""));
  ctx.push("Writing style: "+(STYLES[style]?.l||style)+" \u2014 "+(STYLE_INST[style]||""));
  ctx.push("Length: "+(LEN_SUB[length]||length));
  ctx.push("Output format: "+fmtLabels);
  if(language&&language!=="English")ctx.push("Language: Respond entirely in "+language+". Use natural, native-quality "+language+" throughout.");
  sec("context",ctx.join("\n"));

  // OUTPUT TYPE
  if(output&&OUTPUT_INST[output])sec("output_type",OUTPUT_INST[output]);

  // METHODOLOGY
  const methods=METHODOLOGY[taskType]||METHODOLOGY.writing;
  sec("methodology","Follow this structured approach:\n\n"+methods.map((m,i)=>(i+1)+". "+m).join("\n"));

  // QUALITY
  sec("quality_standards",QUALITY[taskType]||QUALITY.writing);

  // FORMAT DETAIL
  const fmtArr=Array.isArray(format)?format:[format];
  const FMT_INST={
    prose:"Use flowing, well-structured paragraphs with clear topic sentences and logical transitions. Use subheadings to organize major sections.",
    bullets:"Use concise bullet points grouped under clear section headers. Each bullet should be a complete thought (1-2 sentences). Lead with the most important information in each bullet.",
    numbered:"Present key sequences as clearly numbered steps. Start each step with a bold action verb. Include brief explanations under each step when needed.",
    table:"Organize comparative or multi-variable information into well-labeled tables with clear column headers. Add a narrative summary before and after each table highlighting key takeaways.",
    qa:"Structure appropriate sections as specific questions followed by thorough answers. Order from foundational to advanced. Make each Q&A pair self-contained.",
    json:"Where structured data is appropriate, return valid JSON with descriptive camelCase key names. Include a description field for each major section.",
    codeblock:"Present any technical content as clean, well-commented code blocks. Specify the language. Include imports, type annotations, error handling, and usage examples.",
    headers:"Use a clear hierarchy of section headers (H2 for major sections, H3 for subsections). Every section should be scannable independently. Include a table of contents for longer responses.",
    tldr:"Begin with a TL;DR section (3-5 sentences capturing the absolute essence), then follow with the full detailed response. The TL;DR must be useful on its own.",
    framework:"Structure your response around a recognized framework or model relevant to the domain. Name the framework explicitly, explain why it applies, and map your analysis to its components.",
    flowchart:"Include text-based decision trees or flowcharts (using arrows and branching) to illustrate processes, decisions, or workflows. Label each decision point and outcome clearly.",
    before_after:"Where applicable, use Before / After comparisons to illustrate transformations, improvements, or changes. Show concrete examples of the current state vs. the recommended state.",
    pros_cons:"For any recommendation or option, include a structured Pros & Cons analysis. Be specific \u2014 generic pros/cons like 'saves time' need quantification or context.",
    scorecard:"Evaluate options using a structured scorecard or rating matrix. Define clear criteria, use a consistent scale (e.g., 1-5 or Low/Med/High), and include weighted totals if appropriate.",
    annotated:"Include annotated examples that walk through real or realistic scenarios step by step, with inline commentary explaining why each element matters and what to watch for.",
    markdown:"Format the entire response as clean, valid Markdown ready for direct use in documentation, READMEs, or CMS platforms. Use proper heading hierarchy, code fences, links, and emphasis."
  };
  const fmtL=[];
  if(fmtArr.length===0)fmtL.push("Use the most appropriate format for the content.");
  else fmtL.push("Combine these formatting approaches throughout your response as appropriate:\n\n"+fmtArr.map((f,i)=>(i+1)+". **"+(FMTS[f]?.l||f)+"**: "+(FMT_INST[f]||"")).join("\n"));
  const lenG={Brief:"~200\u2013400 words. Only highest-impact information.",Medium:"~500\u2013900 words. Cover all major aspects with supporting detail.",Detailed:"~1000\u20131800 words. Thorough explanations, examples, and nuance.",Comprehensive:"~2000+ words. Exhaustive reference-grade. Every dimension with depth, examples, evidence."};
  fmtL.push(lenG[length]||lenG.Medium);
  sec("formatting",fmtL.join("\n\n"));

  // INCLUDES
  if(includes.length>0){
    const incInst=[];
    if(includes.includes("exec_summary"))incInst.push("Begin with an Executive Summary (3-5 sentences) stating the core findings or recommendations upfront");
    if(includes.includes("examples"))incInst.push("Include at least 2-3 real-world examples that illustrate key points concretely \u2014 use named companies, real scenarios, or plausible case studies");

    if(includes.includes("risks"))incInst.push("Include a Risk Assessment section: identify top 3-5 risks, their likelihood (high/med/low), impact, and mitigation strategies");
    if(includes.includes("comparison"))incInst.push("Include a structured Comparison Table evaluating options on the same criteria. Use consistent scoring or rating.");
    if(includes.includes("timeline"))incInst.push("Include a Timeline / Milestones section with specific phases, deliverables, and estimated dates");
    if(includes.includes("metrics"))incInst.push("Define specific measurable KPIs / Metrics for success. Include baseline, target, and measurement method for each.");
    if(includes.includes("glossary"))incInst.push("Include a Glossary section defining all technical terms, acronyms, and domain-specific jargon used");
    if(includes.includes("visuals"))incInst.push("Describe recommended Visuals / Charts: what type (bar, line, flowchart, etc.), what data it shows, and why it helps the reader");
    sec("required_sections","Your response MUST include these sections:\n\n"+incInst.map((x,i)=>(i+1)+". "+x).join("\n"));
  }

  // SMART ENHANCEMENTS — injected intelligently
  const smartTechniques=enhancements.filter(e=>e.type==="technique"||e.type==="comparison"||e.type==="precision"||e.type==="safety"||e.type==="jurisdiction"||e.type==="production"||e.type==="structure");
  if(smartTechniques.length>0){
    sec("smart_guidance","The following expert guidance has been automatically applied based on your task context:\n\n"+smartTechniques.map(e=>"- "+e.text).join("\n\n"));
  }

  // TECHNIQUES (user-selected)
  if(techniques.includes("cot"))sec("reasoning","Think through this step by step. Show your reasoning explicitly \u2014 walk through logic, evaluate alternatives, explain each conclusion.");
  if(techniques.includes("fewshot"))sec("examples_format",isXml?"Model your response after this pattern:\n\n<example>\n  <input>[Describe example input]</input>\n  <ideal_output>[Describe ideal output]</ideal_output>\n</example>\n\n(Replace with your own examples)":"Model your response after this pattern:\n\n**Example Input:** [Describe example input]\n**Ideal Output:** [Describe ideal output]\n\n*(Replace with your own examples)*");
  if(techniques.includes("constraints"))sec("constraints","1. Never fabricate facts, statistics, or sources\n2. If uncertain, say so explicitly with confidence level\n3. Stay tightly focused \u2014 no tangential drift\n4. Distinguish between established facts, analysis, and speculation\n5. Flag potentially incorrect assumptions before proceeding");
  if(techniques.includes("selfcheck"))sec("self_verification","Before submitting, verify:\n- Does it fully address every aspect of the task?\n- Is structure clear and scannable?\n- Are all claims supported?\n- Is tone consistent and audience-appropriate?\n- No unnecessary repetition or filler?\nRevise any section that fails these checks.");
  if(techniques.includes("compare"))sec("comparative_approach","Present each option with clear label and description. Evaluate on same criteria. Use structured comparison for 3+ options. State recommendation with reasoning. Note circumstances favoring alternatives.");
  if(techniques.includes("iterative"))sec("refinement","After initial draft: re-read as target audience, identify gaps or weak arguments, provide improved version, note what changed and why.");
  if(techniques.includes("roleplay"))sec("persona_depth","Embody this role fully. Draw on deep domain expertise. Use vocabulary and reasoning patterns natural to this role. Maintain consistent perspective throughout.");

  // EXTRA
  if(extra)sec("additional_instructions",extra);

  // ANTI-PATTERNS
  sec("avoid","- Do not open with filler phrases like \"Sure!\" or \"Great question!\" \u2014 begin directly with substance\n- Do not use vague hedging like \"it depends\" without explaining what it depends on specifically\n- Do not pad with generic background the audience already knows\n- Do not end with empty clich\u00e9s \u2014 close with actionable specifics\n- Do not repeat the same point in different words to inflate length");

  return lines.join("\n\n");
}

/* ═══════════════════════════════════════════════════════
   HISTORY — localStorage persistence
   ═══════════════════════════════════════════════════════ */
const HISTORY_KEY="promptarchitect_history";
function loadHistory(){try{return JSON.parse(localStorage.getItem(HISTORY_KEY))||[];}catch(e){return[];}}
function saveHistory(h){try{localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,20)));}catch(e){}}

/* ═══════════════════════════════════════════════════════
   UI COMPONENTS
   ═══════════════════════════════════════════════════════ */
const Chip=({active,onClick,children,accent,sx})=><button onClick={onClick} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",borderRadius:8,border:"1.5px solid "+(active?accent||"var(--ac)":"var(--bd)"),background:active?(accent||"var(--ac)")+"14":"var(--s2)",color:active?accent||"var(--ac)":"var(--t2)",cursor:"pointer",fontSize:12.5,fontWeight:active?600:450,fontFamily:"var(--f)",transition:"all .15s",whiteSpace:"nowrap",...sx}}>{children}</button>;

const Step=({ico,title,sub,children,collapsed,onToggle})=>(
  <div style={{marginBottom:26}}>
    <div onClick={onToggle} style={{display:"flex",alignItems:"center",gap:10,marginBottom:sub&&!collapsed?4:collapsed?0:10,cursor:onToggle?"pointer":"default"}}>
      <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:30,height:30,borderRadius:8,background:"var(--ac)14",flexShrink:0}}>{I[ico]?.(14,"var(--ac)")}</span>
      <span style={{fontSize:14,fontWeight:650,color:"var(--t1)",fontFamily:"var(--f)",letterSpacing:"-.2px",flex:1}}>{title}</span>
      {onToggle&&<span style={{color:"var(--t3)",fontSize:12,transition:"transform .2s",transform:collapsed?"rotate(-90deg)":"rotate(0deg)"}}>&#9660;</span>}
    </div>
    {!collapsed&&sub&&<p style={{margin:"0 0 10px 40px",fontSize:12,color:"var(--t3)",fontFamily:"var(--f)"}}>{sub}</p>}
    {!collapsed&&<div style={{marginLeft:40}}>{children}</div>}
  </div>
);

const Wrap=({children})=><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{children}</div>;

/* ═══════════════════════════════════════════════════════
   MAIN APP
   ═══════════════════════════════════════════════════════ */
function App(){
  const [mode,setMode]=useState("amateur");
  const [topic,setTopic]=useState("");
  const [task,setTask]=useState("writing");
  const [model,setModel]=useState("claude");
  const [industry,setIndustry]=useState("general");
  const [output,setOutput]=useState("document");
  const [style,setStyle]=useState("formal");
  const [tone,setTone]=useState("Professional");

  const [techs,setTechs]=useState([]);
  const [aud,setAud]=useState("");
  const [extra,setExtra]=useState("");
  const [language,setLanguage]=useState("English");
  const [copied,setCopied]=useState(false);
  const [show,setShow]=useState(false);
  const [history,setHistory]=useState(()=>loadHistory());

  const [user,setUser]=useState(()=>loadUser());
  const [showAuth,setShowAuth]=useState(false);
  const [authMode,setAuthMode]=useState("login");
  const [authEmail,setAuthEmail]=useState("");
  const [authPassword,setAuthPassword]=useState("");
  const [authName,setAuthName]=useState("");
  const [authErr,setAuthErr]=useState("");
  const [promptGenerated,setPromptGenerated]=useState(false);
  const [exampleSector,setExampleSector]=useState("All");
  const ref=useRef(null);
  const isExp=mode==="expert";
  const ac=MODELS[model].col;
  const acRgb={"#0891B2":"8,145,178","#D97706":"217,119,6","#10A37F":"16,163,127","#4285F4":"66,133,244","#8B5CF6":"139,92,246","#64748B":"100,116,139"}[ac];

  const prompt=buildPrompt({topic,taskType:task,model,tone,length:len,format:fmt,techniques:techs,audience:aud,extra,mode,industry,output,style,includes,language});
  const enhancements=useMemo(()=>topic.trim()?getSmartEnhancements(topic,task,industry,output):[], [topic,task,industry,output]);

  const go=useCallback(()=>{
    setShow(true);
    setPromptGenerated(true);
    // Save to history only if user logged in
    if(user){
      const entry={topic,task,industry,output,model,timestamp:Date.now()};
      const newHist=[entry,...history.filter(h=>h.topic!==topic)].slice(0,20);
      setHistory(newHist);
      saveHistory(newHist);
    }
    setTimeout(()=>ref.current?.scrollIntoView({behavior:"smooth",block:"start"}),120);
  },[topic,task,industry,output,model,history,user]);

  const cp=useCallback(()=>{try{navigator.clipboard.writeText(prompt).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2200);});}catch(e){const ta=document.createElement("textarea");ta.value=prompt;ta.style.cssText="position:fixed;left:-9999px;top:-9999px";document.body.appendChild(ta);ta.focus();ta.select();document.execCommand("copy");document.body.removeChild(ta);setCopied(true);setTimeout(()=>setCopied(false),2200);}},[prompt]);

  const exportTxt=useCallback(()=>{const blob=new Blob([prompt],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="prompt-"+(task)+"-"+Date.now()+".txt";a.click();URL.revokeObjectURL(url);},[prompt,task]);

  const loadExample=useCallback((ex)=>{setTopic(ex.topic);setTask(ex.task);setIndustry(ex.industry);setOutput(ex.output);setModel(ex.model);setShow(false);},[]);

  const loadFromHistory=useCallback((h)=>{setTopic(h.topic);setTask(h.task);setIndustry(h.industry);setOutput(h.output);setModel(h.model);setShowHistory(false);setShow(false);},[]);

  const clearHistory=useCallback(()=>{setHistory([]);saveHistory([]);setShowHistory(false);},[]);

  const ti=useCallback(v=>setIncludes(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]),[]);
  const tf=useCallback(v=>setFmt(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]),[]);
  const tt=useCallback(v=>setTechs(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]),[]);

  const inp=(sx={})=>({width:"100%",padding:12,borderRadius:9,border:"1.5px solid var(--bd)",background:"var(--bg)",color:"var(--t1)",fontSize:13.5,fontFamily:"var(--f)",outline:"none",transition:"border .2s",lineHeight:1.6,...sx});

  const handleAuthSubmit=useCallback((e)=>{
    e.preventDefault();
    setAuthErr("");
    if(authMode==="signup"){
      if(!authName.trim()){setAuthErr("Name required");return;}
      const res=signupUser(authName,authEmail,authPassword);
      if(!res.ok){setAuthErr(res.msg);return;}
      saveUser(res.user);
      setUser(res.user);
      setShowAuth(false);
      setAuthEmail("");setAuthPassword("");setAuthName("");setAuthMode("login");
    }else{
      const res=loginUser(authEmail,authPassword);
      if(!res.ok){setAuthErr(res.msg);return;}
      saveUser(res.user);
      setUser(res.user);
      setShowAuth(false);
      setAuthEmail("");setAuthPassword("");
    }
  },[authMode,authName,authEmail,authPassword]);

  const handleLogout=useCallback(()=>{setUser(null);saveUser(null);setShowAuth(false);},[]);

  return <>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');
      :root{--f:'Instrument Sans',-apple-system,sans-serif;--m:'IBM Plex Mono',monospace;--bg:#f8fafc;--s1:#ffffff;--s2:#f1f5f9;--bd:#e2e8f0;--t1:#1e293b;--t2:#475569;--t3:#94a3b8;--ac:${ac};--ac-rgb:${acRgb}}
      *{box-sizing:border-box}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}::-webkit-scrollbar-track{background:transparent}
      @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
      body{background:#f8fafc}
      textarea:focus,input:focus{border-color:${ac}!important;box-shadow:0 0 0 3px ${ac}20}
    `}</style>
    {/* STICKY NAV */}
    <nav style={{position:"fixed",top:0,left:0,right:0,background:"var(--s1)",borderBottom:"1px solid var(--bd)",zIndex:1000,padding:"12px 14px"}}>
      <div style={{maxWidth:760,margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {I.bolt(20,ac)}
          <span style={{fontWeight:700,fontSize:16,color:"var(--t1)"}}>Prompt Architect</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          {user?(
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:13,color:"var(--t2)"}}>{user.name}</span>
              <button onClick={handleLogout} style={{fontSize:12,padding:"6px 14px",border:"1px solid var(--bd)",background:"var(--bg)",borderRadius:7,cursor:"pointer",color:"var(--t2)",fontFamily:"var(--f)",transition:"all .2s"}}> Logout</button>
            </div>
          ):(
            <>
              <button onClick={()=>{setAuthMode("login");setShowAuth(true);setAuthErr("");}} style={{fontSize:12,padding:"6px 14px",border:"none",background:"transparent",color:"var(--t2)",cursor:"pointer",fontFamily:"var(--f)"}}>Log in</button>

            </>
          )}
        </div>
      </div>
    </nav>

    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--t1)",fontFamily:"var(--f)",paddingTop:60,paddingBottom:60,paddingLeft:14,paddingRight:14,maxWidth:760,margin:"0 auto"}}>

      {/* HERO SECTION - COMPACT */}
      <section style={{marginBottom:40,paddingTop:20}}>
        <h1 style={{fontSize:32,fontWeight:800,margin:"0 0 12px",lineHeight:1.2,color:"var(--t1)"}}>Turn vague ideas into expert-level AI prompts</h1>
        <p style={{fontSize:14,color:"var(--t2)",margin:"0 0 24px",lineHeight:1.5,maxWidth:600}}>Smart prompt engineering that analyzes your goal and automatically injects audience targeting, reasoning strategies, and domain expertise.</p>
      </section>

      {/* TWO-COLUMN LAYOUT */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:30,marginBottom:40,alignItems:"start"}}>
        {/* MAIN TOOL AREA */}
        <div id="tool">
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
            <div style={{width:28,height:28,borderRadius:8,background:ac+"18",display:"flex",alignItems:"center",justifyContent:"center"}}>{I.bolt(16,ac)}</div>
            <h2 style={{fontSize:20,fontWeight:700,margin:0}}>Build Your Prompt</h2>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>

                <button key={m} onClick={()=>setMode(m)} style={{display:"flex",alignItems:"center",gap:6,padding:"8px 24px",border:"none",borderRadius:7.5,cursor:"pointer",background:mode===m?ac:"transparent",color:mode===m?"#fff":"var(--t3)",fontFamily:"var(--f)",fontSize:12.5,fontWeight:620,transition:"all .2s"}}>{I[ic](13,mode===m?"#fff":"var(--t3)")}{lb}</button>
              ))}
            </div>
            {user&&history.length>0&&(
              <button onClick={()=>setShowHistory(!showHistory)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 14px",borderRadius:10,border:"1px solid var(--bd)",background:"var(--s1)",color:"var(--t2)",cursor:"pointer",fontSize:12,fontFamily:"var(--f)",fontWeight:500}}>

        {/* RIGHT SIDEBAR - HOW IT WORKS */}
        <aside style={{background:"var(--s1)",borderRadius:12,padding:20,border:"1px solid var(--bd)",position:"sticky",top:100}}>
          <h3 style={{fontSize:13,fontWeight:700,margin:"0 0 16px",color:"var(--t1)",textTransform:"uppercase",letterSpacing:".5px"}}>How it works</h3>
          {[{n:"1",t:"Describe goal"},{n:"2",t:"Get enhanced"},{n:"3",t:"Copy & paste"}].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:12,marginBottom:i<2?16:0}}>
              <div style={{width:32,height:32,borderRadius:8,background:ac,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,flexShrink:0}}>{s.n}</div>

                <p style={{fontSize:12,fontWeight:600,color:"var(--t1)",margin:"2px 0 2px"}}>{s.t}</p>

              </div>

        </aside>

        {/* TOPIC */}
        <Step ico="pen" title="Describe your goal" sub="Be specific \u2014 but don't worry about being perfect. Smart enhancement fills the gaps.">
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"flex-start"}}>
            <textarea value={topic} onChange={e=>{setTopic(e.target.value);setShow(false);}} placeholder="e.g. Build a DCF valuation tutorial for finance students who understand basic accounting but are new to valuation models. Include a worked example using Apple's 2024 financials..." rows={3} style={{...inp({resize:"vertical"}),flex:1}} />
            {topic.trim()&&(
              <button onClick={()=>{setTopic("");setShow(false);}} style={{padding:"10px 12px",borderRadius:7,border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",cursor:"pointer",fontSize:11.5,fontFamily:"var(--f)",fontWeight:600,transition:"all .2s",alignSelf:"flex-start",whiteSpace:"nowrap"}}>{I.trash(12,"#dc2626")} Clear</button>

                ))}

                {EXAMPLES.filter(ex=>exampleSector==="All"||ex.sector===exampleSector).map((ex,i)=>(

          {/* SMART ENHANCEMENT BADGES */}
          {topic.trim()&&enhancements.length>0&&(
            <div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:ac+"0A",border:"1px solid "+ac+"1A",animation:"fadeIn .3s ease"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                {I.wand(13,ac)}
                <span style={{fontSize:11.5,fontWeight:640,color:ac}}>Smart Enhancements Active</span>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {enhancements.map((e,i)=>(
                  <span key={i} style={{padding:"3px 9px",borderRadius:5,background:ac+"14",color:ac,fontSize:10.5,fontWeight:550}}>{e.label}</span>
                ))}
              </div>
            </div>
          )}
        </Step>

        {/* TASK + INDUSTRY */}
        <Step ico="layout" title="Task type">
          <Wrap>{Object.entries(TASKS).map(([k,v])=><Chip key={k} active={task===k} accent={ac} onClick={()=>setTask(k)}>{I[v.i]?.(12,task===k?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        <Step ico="building" title="Industry / Sector" sub="Injects domain-specific terminology, frameworks, and compliance requirements">
          <Wrap>{Object.entries(INDUSTRIES).map(([k,v])=><Chip key={k} active={industry===k} accent={ac} onClick={()=>setIndustry(k)}>{I[v.i]?.(12,industry===k?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        {/* OUTPUT TYPE */}
        <Step ico="file" title="Output type" sub="What deliverable format should the AI produce?">
          <Wrap>{Object.entries(OUTPUTS).map(([k,v])=><Chip key={k} active={output===k} accent={ac} onClick={()=>setOutput(k)}>{I[v.i]?.(12,output===k?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        {/* AI MODEL */}
        <Step ico="cpu" title="Target AI model">
          <Wrap>
            {Object.entries(MODELS).map(([k,v])=>(
              <button key={k} onClick={()=>setModel(k)} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 14px",borderRadius:9,border:"1.5px solid "+(model===k?v.col:"var(--bd)"),background:model===k?v.col+"14":"var(--s2)",color:model===k?v.col:"var(--t2)",cursor:"pointer",fontSize:12.5,fontWeight:model===k?620:450,fontFamily:"var(--f)",transition:"all .15s"}}><MM id={k} size={17}/>{v.name}</button>
            ))}
          </Wrap>
          <div style={{marginTop:9,padding:"8px 12px",borderRadius:8,background:ac+"0C",border:"1px solid "+ac+"1A",fontSize:11.5,color:"var(--t2)",lineHeight:1.5,display:"flex",gap:7,alignItems:"center"}}>{I.info(13,ac)}<span>{MODELS[model].tips}</span></div>
        </Step>

        {/* STYLE */}
        <Step ico="pen" title="Writing style">
          <Wrap>{Object.entries(STYLES).map(([k,v])=><Chip key={k} active={style===k} accent={ac} onClick={()=>setStyle(k)}>{I[v.i]?.(12,style===k?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        {/* TONE */}
        <Step ico="speaker" title="Tone">
          <Wrap>{TONES.map(({v,i:ic})=><Chip key={v} active={tone===v} accent={ac} onClick={()=>setTone(v)}>{I[ic]?.(12,tone===v?ac:"var(--t3)")}{v}</Chip>)}</Wrap>
        </Step>

        {/* LENGTH + FORMAT */}
        <Step ico="ruler" title="Length">
          <Wrap>{LENGTHS.map(l=><Chip key={l} active={len===l} accent={ac} onClick={()=>setLen(l)} sx={{flexDirection:"column",alignItems:"flex-start",gap:0,padding:"8px 14px"}}><span>{l}</span><span style={{fontSize:10.5,color:"var(--t3)",fontWeight:400}}>{LEN_SUB[l]}</span></Chip>)}</Wrap>
        </Step>

        <Step ico="layout" title="Response format" sub="Select one or more \u2014 they combine in the prompt">
          <Wrap>{Object.entries(FMTS).map(([k,v])=><Chip key={k} active={fmt.includes(k)} accent={ac} onClick={()=>tf(k)}>{I[v.i]?.(12,fmt.includes(k)?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        {/* LANGUAGE */}
        <Step ico="lang" title="Language">
          <Wrap>{LANGS.map(l=><Chip key={l} active={language===l} accent={ac} onClick={()=>setLanguage(l)}>{l}</Chip>)}</Wrap>
        </Step>

        {/* INCLUDES */}
        <Step ico="checkList" title="Include sections" sub="Select specific sections that must appear in the response">
          <Wrap>{Object.entries(INCLUDES).map(([k,v])=><Chip key={k} active={includes.includes(k)} accent={ac} onClick={()=>ti(k)}>{I[v.i]?.(12,includes.includes(k)?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>

        {/* EXPERT SECTIONS */}
        {isExp&&<Step ico="brain" title="Advanced techniques" sub="Each adds a dedicated instruction block to the prompt">
          <Wrap>{Object.entries(TECHS).map(([k,v])=><Chip key={k} active={techs.includes(k)} accent={ac} onClick={()=>tt(k)}>{I[v.i]?.(12,techs.includes(k)?ac:"var(--t3)")}{v.l}</Chip>)}</Wrap>
        </Step>}

        {isExp&&<Step ico="users" title="Target audience" sub="Override smart audience detection with a specific audience">
          <input value={aud} onChange={e=>setAud(e.target.value)} placeholder="Leave blank for smart detection, or specify: e.g. Finance students, mid-level managers, senior developers..." style={inp()} />
        </Step>}

        {isExp&&<Step ico="plus" title="Additional instructions" sub="Added verbatim as a final section">
          <textarea value={extra} onChange={e=>setExtra(e.target.value)} placeholder="e.g. Use Apple's 2024 10-K as the worked example, include sensitivity analysis..." rows={2} style={inp({resize:"vertical"})} />
        </Step>}

        {/* GENERATE */}
        <div style={{display:"flex",justifyContent:"center",paddingTop:8}}>
          <button onClick={go} disabled={!topic.trim()} style={{display:"flex",alignItems:"center",gap:8,padding:"12px 38px",borderRadius:10,border:"none",background:topic.trim()?ac:"rgba(255,255,255,.04)",color:topic.trim()?"#fff":"var(--t3)",fontSize:14,fontWeight:660,fontFamily:"var(--f)",cursor:topic.trim()?"pointer":"not-allowed",transition:"all .2s",boxShadow:topic.trim()?"0 6px 28px "+ac+"35":"none"}}>{I.sparkle(15,topic.trim()?"#fff":"var(--t3)")} Generate Prompt</button>
        </div>
      </div>

      {/* RESULT */}
      {show&&topic.trim()&&(
        <div ref={ref} style={{background:"var(--s1)",borderRadius:16,border:"1px solid var(--bd)",overflow:"hidden",animation:"up .35s ease"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"13px 20px",borderBottom:"1px solid var(--bd)",flexWrap:"wrap",gap:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <MM id={model} size={18}/>
              <span style={{fontWeight:640,fontSize:13}}>{MODELS[model].name}</span>
              <span style={{fontSize:11,color:ac,background:ac+"14",padding:"2px 8px",borderRadius:5,fontWeight:600}}>{INDUSTRIES[industry].l}</span>
              <span style={{fontSize:11,color:"var(--t3)",background:"var(--s2)",padding:"2px 8px",borderRadius:5}}>{isExp?"Expert":"Simple"}</span>
              {enhancements.length>0&&<span style={{fontSize:11,color:"#10B981",background:"#10B98114",padding:"2px 8px",borderRadius:5,fontWeight:600,display:"flex",alignItems:"center",gap:3}}>{I.wand(10,"#10B981")} {enhancements.length} smart boost{enhancements.length!==1?"s":""}</span>}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={exportTxt} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 12px",borderRadius:7,border:"1px solid var(--bd)",background:"var(--s2)",color:"var(--t2)",fontWeight:600,fontSize:12,fontFamily:"var(--f)",cursor:"pointer",transition:"all .2s"}}>{I.download(12,"var(--t2)")} .txt</button>
              <button onClick={cp} style={{display:"flex",alignItems:"center",gap:5,padding:"6px 14px",borderRadius:7,border:"none",background:copied?"#10A37F":ac,color:"#fff",fontWeight:600,fontSize:12,fontFamily:"var(--f)",cursor:"pointer",transition:"all .2s"}}>{copied?I.check(12,"#fff"):I.copy(12,"#fff")}{copied?"Copied":"Copy"}</button>
            </div>
          </div>
          <pre style={{padding:"20px 22px",margin:0,whiteSpace:"pre-wrap",wordWrap:"break-word",fontSize:12,lineHeight:1.8,fontFamily:"var(--m)",color:"var(--t2)",background:"var(--bg)",maxHeight:600,overflow:"auto"}}>{prompt}</pre>
          <div style={{padding:"10px 20px",borderTop:"1px solid var(--bd)",display:"flex",gap:14,flexWrap:"wrap",fontSize:11,color:"var(--t3)"}}>
            <span style={{display:"flex",alignItems:"center",gap:3}}>{I.hash(10,"var(--t3)")} {prompt.length} chars</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}>{I.fileText(10,"var(--t3)")} ~{Math.ceil(prompt.split(/\s+/).length/0.75)} tokens</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}>{I[TASKS[task].i]?.(10,"var(--t3)")} {TASKS[task].l}</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}>{I.target(10,"var(--t3)")} {tone}</span>
            <span style={{display:"flex",alignItems:"center",gap:3}}>{I.file(10,"var(--t3)")} {OUTPUTS[output].l}</span>
            {language!=="English"&&<span style={{display:"flex",alignItems:"center",gap:3}}>{I.lang(10,"var(--t3)")} {language}</span>}
          </div>
          {!user&&promptGenerated&&(
            <div style={{padding:"20px",background:"var(--s2)",borderTop:"1px solid var(--bd)",textAlign:"center"}}>
              <p style={{margin:"0 0 12px",fontSize:13,color:"var(--t2)",fontWeight:500}}>Save your prompt history and unlock advanced features</p>
              <button onClick={()=>{setAuthMode("signup");setShowAuth(true);setAuthErr("");}} style={{padding:"10px 20px",background:ac,color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:700,fontFamily:"var(--f)",cursor:"pointer",transition:"all .2s"}}>Create account</button>
            </div>
          )}
        </div>
      )}

      {/* FOOTER */}
      <footer style={{textAlign:"center",marginTop:40,paddingTop:20,borderTop:"1px solid var(--bd)"}}>
        <p style={{color:"var(--t3)",fontSize:11.5,margin:0}}>Prompt Architect \u2014 Smart AI prompt engineering</p>
        <p style={{color:"var(--t3)",fontSize:10.5,margin:"4px 0 0",opacity:.6}}>No data leaves your browser. All prompt generation happens locally.</p>
      </footer>
    </div>

    {/* AUTH MODAL */}
    {showAuth&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000,padding:20}} onClick={()=>setShowAuth(false)}>
        <div style={{background:"var(--s1)",borderRadius:16,padding:32,maxWidth:360,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,.15)",animation:"slideDown .3s ease"}} onClick={(e)=>e.stopPropagation()}>
          <h2 style={{fontSize:20,fontWeight:700,margin:"0 0 24px",color:"var(--t1)",textAlign:"center"}}>{authMode==="signup"?"Create your account":"Sign in to your account"}</h2>
          <form onSubmit={handleAuthSubmit} style={{display:"flex",flexDirection:"column",gap:12}}>
            {authMode==="signup"&&(
              <input value={authName} onChange={(e)=>setAuthName(e.target.value)} placeholder="Your name" style={inp({fontSize:14,padding:14})} />
            )}
            <input value={authEmail} onChange={(e)=>setAuthEmail(e.target.value)} type="email" placeholder="Email address" style={inp({fontSize:14,padding:14})} />
            <input value={authPassword} onChange={(e)=>setAuthPassword(e.target.value)} type="password" placeholder="Password" style={inp({fontSize:14,padding:14})} />
            {authErr&&<div style={{padding:10,background:"#fee2e2",border:"1px solid #fecaca",borderRadius:8,fontSize:13,color:"#dc2626",fontFamily:"var(--f)"}}>{authErr}</div>}
            <button type="submit" style={{padding:14,background:ac,color:"#fff",border:"none",borderRadius:8,fontSize:14,fontWeight:700,fontFamily:"var(--f)",cursor:"pointer",transition:"all .2s",marginTop:8}}>{authMode==="signup"?"Create account":"Sign in"}</button>
          </form>
          <div style={{marginTop:20,textAlign:"center",fontSize:13,color:"var(--t2)"}}>
            {authMode==="signup"?(<>Already have an account? <button onClick={()=>{setAuthMode("login");setAuthErr("");}} style={{border:"none",background:"none",color:ac,cursor:"pointer",fontWeight:700,fontFamily:"var(--f)"}}>Sign in</button></>):(<>Don't have an account? <button onClick={()=>{setAuthMode("signup");setAuthErr("");}} style={{border:"none",background:"none",color:ac,cursor:"pointer",fontWeight:700,fontFamily:"var(--f)"}}>Sign up</button></>)}
          </div>
        </div>
      </div>
    )}
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
